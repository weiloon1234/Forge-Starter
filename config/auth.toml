[auth]
default_guard = "user"

[auth.guards.user]
driver = "token"

[auth.guards.admin]
driver = "session"

[auth.tokens]
access_token_ttl_minutes = 15
refresh_token_ttl_days = 30
token_length = 32
rotate_refresh_tokens = true

[auth.sessions]
ttl_minutes = 120
cookie_name = "forge_session"
# Development: false (HTTP). Production override: AUTH__SESSIONS__COOKIE_SECURE=true
cookie_secure = false
cookie_path = "/"
sliding_expiry = true
remember_ttl_days = 30
